name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — import & compile smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile every Python file (catches truncation / syntax errors)
        working-directory: backend
        run: python -m compileall -q .
      - name: Import the FastAPI app (catches missing helpers / bad imports)
        working-directory: backend
        env:
          MOCK_MODE: "true"
          ANTHROPIC_API_KEY: "ci-dummy-key"
        run: python -c "from main import app; assert len(app.routes) > 5; print('app OK -', len(app.routes), 'routes')"
      - name: Cleanup ratchet — no unused imports/vars or dead code
        working-directory: backend
        run: |
          pip install ruff vulture
          ruff check . --select F401,F811,F841   # HARD gate: unused imports / redefs / unused vars
          echo "--- vulture (advisory dead-code scan; candidates to verify, not a gate) ---"
          vulture . --min-confidence 80 --exclude tests,evals,__pycache__ || true
      - name: Dependency vulnerability scan (advisory)
        working-directory: backend
        run: |
          pip install pip-audit
          echo "--- pip-audit: known-CVE scan of dependencies (advisory; promote to a gate later) ---"
          pip-audit -r requirements.txt --progress-spinner=off || true
      - name: Run regression tests (no API key)
        working-directory: backend
        env:
          MOCK_MODE: "true"
          ANTHROPIC_API_KEY: "ci-dummy-key"
        run: |
          pip install pytest
          pytest -q

  frontend:
    name: Frontend — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Build (catches JSX truncation / compile errors)
        working-directory: frontend
        run: npm run build
