name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — import & compile smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile every Python file (catches truncation / syntax errors)
        working-directory: backend
        run: python -m compileall -q .
      - name: Import the FastAPI app (catches missing helpers / bad imports)
        working-directory: backend
        env:
          MOCK_MODE: "true"
          ANTHROPIC_API_KEY: "ci-dummy-key"
        run: python -c "from main import app; assert len(app.routes) > 5; print('app OK -', len(app.routes), 'routes')"
      - name: Run regression tests (no API key)
        working-directory: backend
        env:
          MOCK_MODE: "true"
          ANTHROPIC_API_KEY: "ci-dummy-key"
        run: |
          pip install pytest
          pytest -q

  frontend:
    name: Frontend — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Build (catches JSX truncation / compile errors)
        working-directory: frontend
        run: npm run build
